# =============================================================================
# Kouroukan - Docker Compose Override (Dev Local)
# Surcharge pour desactiver SSL/certbot et utiliser HTTP
# =============================================================================

services:
  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      frontend:
        condition: service_healthy
      portal:
        condition: service_healthy
      gateway:
        condition: service_healthy

  # Desactiver certbot en dev
  certbot:
    profiles:
      - production

  # Fix: override GnDapper connection string for all services
  gateway:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-kouroukan.gn}
      - Jwt__Audience=${JWT_AUDIENCE:-kouroukan-app}
      - ConnectionStrings__Redis=redis:6379,abortConnect=false,connectTimeout=5000

  inscriptions-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  pedagogie-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  evaluations-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  presences-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  finances-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  personnel-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  communication-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  bde-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  documents-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  services-premium-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  support-service:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}

  cache:
    environment:
      - GnDapper__ConnectionString=${DB_CONNECTION_STRING}
