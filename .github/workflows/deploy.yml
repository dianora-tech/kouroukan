# =============================================================================
# Kouroukan - Deploy Pipeline (via Coolify)
# =============================================================================
# Declenchement : apres CI reussie sur develop (env test) ou main (production)
# Action : appel API Coolify pour declencher le deploiement
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Deploy Test (develop → Coolify env test)
  # ===========================================================================
  deploy-test:
    name: Deploy to Test (Coolify)
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    environment: test

    steps:
      - name: Trigger Coolify deployment
        run: |
          echo "Triggering Coolify deployment for develop branch..."
          RESPONSE=$(curl -sf --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false")

          echo "Response: $RESPONSE"
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid // empty')

          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Failed to trigger deployment"
            exit 1
          fi

          echo "Deployment queued: $DEPLOYMENT_UUID"
          echo "DEPLOYMENT_UUID=$DEPLOYMENT_UUID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment $DEPLOYMENT_UUID to complete..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sf --max-time 10 \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              -H "Accept: application/json" \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              | jq -r '.status // "unknown"')

            echo "  Attempt $i: status=$STATUS"

            case "$STATUS" in
              finished)
                echo "Deployment succeeded!"
                exit 0
                ;;
              failed|cancelled)
                echo "::error::Deployment $STATUS"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Deployment timed out after 15 minutes"
          exit 1

      - name: Health check
        if: success()
        run: |
          echo "Running health checks..."
          sleep 10

          for domain in kouroukan.dianora.org app.kouroukan.dianora.org api.kouroukan.dianora.org; do
            HTTP_CODE=$(curl -sk --max-time 15 -o /dev/null -w '%{http_code}' "https://$domain" || echo "000")
            if [ "$HTTP_CODE" = "000" ]; then
              echo "::warning::$domain is unreachable (timeout)"
            elif [ "$HTTP_CODE" -ge 500 ] && [ "$domain" != "api.kouroukan.dianora.org" ]; then
              echo "::error::$domain returned HTTP $HTTP_CODE"
              exit 1
            else
              echo "  $domain -> HTTP $HTTP_CODE OK"
            fi
          done

          echo "All health checks passed"

      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Kouroukan deploye en test (Coolify)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Branche: develop

      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Echec deploiement Kouroukan (test)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Verifier les logs GitHub Actions.

  # ===========================================================================
  # Deploy Production (main → a configurer plus tard)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production

    steps:
      - name: Placeholder
        run: |
          echo "Production deployment via Coolify will be configured later."
          echo "For now, production deploys require manual trigger."
