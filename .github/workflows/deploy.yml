# =============================================================================
# Kouroukan - Deploy Pipeline (via Coolify)
# =============================================================================
# Declenchement : apres CI reussie sur develop (env test) ou main (production)
# Envoie un rapport de deploiement detaille par email apres chaque livraison.
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Deploy Test (develop → Coolify env test)
  # ===========================================================================
  deploy-test:
    name: Deploy to Test (Coolify)
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    environment: test

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 50

      - name: Collect deployment context
        id: context
        run: |
          echo "DEPLOY_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "DEPLOY_START_EPOCH=$(date +%s)" >> $GITHUB_ENV

          # Dernier commit
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          COMMIT_AUTHOR=$(git log -1 --format='%an' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV

          # Version
          APP_VERSION=$(cat VERSION 2>/dev/null || echo "v1.0")-dev.$(date +%Y%m%d%H%M)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          # Commits depuis le dernier tag ou les 10 derniers
          COMMITS=$(git log --oneline -10 "$COMMIT_SHA" 2>/dev/null | head -10 || echo "Aucun commit")
          echo "RECENT_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Services impactes (detect via changed files)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          SERVICES=""
          echo "$CHANGED" | grep -q "kouroukan.front/" && SERVICES="$SERVICES,Frontend"
          echo "$CHANGED" | grep -q "kouroukan.portal/" && SERVICES="$SERVICES,Portal"
          echo "$CHANGED" | grep -q "kouroukan.api/" && SERVICES="$SERVICES,Gateway"
          echo "$CHANGED" | grep -q "gn-core-libraries/" && SERVICES="$SERVICES,Core Libraries"
          echo "$CHANGED" | grep -q "inscriptions.service/" && SERVICES="$SERVICES,Inscriptions"
          echo "$CHANGED" | grep -q "pedagogie.service/" && SERVICES="$SERVICES,Pedagogie"
          echo "$CHANGED" | grep -q "evaluations.service/" && SERVICES="$SERVICES,Evaluations"
          echo "$CHANGED" | grep -q "presences.service/" && SERVICES="$SERVICES,Presences"
          echo "$CHANGED" | grep -q "finances.service/" && SERVICES="$SERVICES,Finances"
          echo "$CHANGED" | grep -q "personnel.service/" && SERVICES="$SERVICES,Personnel"
          echo "$CHANGED" | grep -q "communication.service/" && SERVICES="$SERVICES,Communication"
          echo "$CHANGED" | grep -q "support.service/" && SERVICES="$SERVICES,Support"
          echo "$CHANGED" | grep -q "docker" && SERVICES="$SERVICES,Docker/Infra"
          echo "$CHANGED" | grep -q "sql/" && SERVICES="$SERVICES,SQL Migrations"
          SERVICES="${SERVICES#,}"
          [ -z "$SERVICES" ] && SERVICES="Non determine"
          echo "IMPACTED_SERVICES=$SERVICES" >> $GITHUB_ENV

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts

      - name: Parse coverage data
        id: coverage
        run: |
          COVERAGE_JSON="{"
          FIRST=true

          # Frontend coverage (vitest coverage-summary.json)
          if [ -f ci-artifacts/frontend-coverage/coverage-summary.json ]; then
            PCT=$(jq -r '.total.lines.pct // "N/A"' ci-artifacts/frontend-coverage/coverage-summary.json 2>/dev/null || echo "N/A")
            COVERAGE_JSON="${COVERAGE_JSON}\"Frontend\":\"${PCT}%\""
            FIRST=false
          fi

          # .NET coverage (cobertura XML) — extract line-rate from each
          for xml in $(find ci-artifacts -name "coverage.cobertura.xml" 2>/dev/null); do
            COMPONENT=$(echo "$xml" | sed 's|ci-artifacts/coverage-||;s|/.*||')
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$xml" 2>/dev/null | head -1 || echo "")
            if [ -n "$LINE_RATE" ]; then
              PCT=$(echo "$LINE_RATE * 100" | bc 2>/dev/null | cut -d. -f1-2 || echo "N/A")
              [ "$FIRST" = "false" ] && COVERAGE_JSON="${COVERAGE_JSON},"
              COVERAGE_JSON="${COVERAGE_JSON}\"${COMPONENT}\":\"${PCT}%\""
              FIRST=false
            fi
          done

          COVERAGE_JSON="${COVERAGE_JSON}}"
          echo "COVERAGE_DATA=$COVERAGE_JSON" >> $GITHUB_ENV
          echo "Coverage data: $COVERAGE_JSON"

      - name: Trigger Coolify deployment
        run: |
          echo "Triggering Coolify deployment for develop branch..."
          RESPONSE=$(curl -sf --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false")

          echo "Response: $RESPONSE"
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid // empty')

          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Failed to trigger deployment"
            echo "DEPLOY_ERRORS=Impossible de declencher le deploiement Coolify" >> $GITHUB_ENV
            exit 1
          fi

          echo "Deployment queued: $DEPLOYMENT_UUID"
          echo "DEPLOYMENT_UUID=$DEPLOYMENT_UUID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        id: wait
        run: |
          echo "Waiting for deployment $DEPLOYMENT_UUID to complete..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sf --max-time 10 \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              -H "Accept: application/json" \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              | jq -r '.status // "unknown"')

            echo "  Attempt $i: status=$STATUS"

            case "$STATUS" in
              finished)
                echo "Deployment succeeded!"
                exit 0
                ;;
              failed|cancelled)
                echo "::error::Deployment $STATUS"
                echo "DEPLOY_ERRORS=Deploiement Coolify echoue (status: $STATUS)" >> $GITHUB_ENV
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Deployment timed out after 15 minutes"
          echo "DEPLOY_ERRORS=Deploiement expire apres 15 minutes" >> $GITHUB_ENV
          exit 1

      - name: Health check
        id: healthcheck
        if: success()
        run: |
          echo "Running health checks..."
          sleep 10

          HC_JSON="{"
          HC_FIRST=true
          HC_ERRORS=""

          for domain in kouroukan.dianora.org app.kouroukan.dianora.org api.kouroukan.dianora.org; do
            HTTP_CODE=$(curl -sk --max-time 15 -o /dev/null -w '%{http_code}' "https://$domain" || echo "000")
            echo "  $domain -> HTTP $HTTP_CODE"

            [ "$HC_FIRST" = "false" ] && HC_JSON="${HC_JSON},"
            HC_JSON="${HC_JSON}\"${domain}\":\"${HTTP_CODE}\""
            HC_FIRST=false

            if [ "$HTTP_CODE" = "000" ]; then
              HC_ERRORS="${HC_ERRORS}$domain timeout (unreachable);"
            elif [ "$HTTP_CODE" -ge 500 ] && [ "$domain" != "api.kouroukan.dianora.org" ]; then
              HC_ERRORS="${HC_ERRORS}$domain HTTP $HTTP_CODE;"
            fi
          done

          HC_JSON="${HC_JSON}}"
          echo "HEALTH_CHECKS=$HC_JSON" >> $GITHUB_ENV

          if [ -n "$HC_ERRORS" ]; then
            echo "DEPLOY_ERRORS=${DEPLOY_ERRORS:-}Health checks echoues: $HC_ERRORS" >> $GITHUB_ENV
            echo "::error::Health check failures: $HC_ERRORS"
            exit 1
          fi

          echo "All health checks passed"

      - name: Calculate deployment duration
        if: always()
        run: |
          DEPLOY_END_EPOCH=$(date +%s)
          DURATION=$((DEPLOY_END_EPOCH - DEPLOY_START_EPOCH))
          echo "DEPLOY_DURATION=$DURATION" >> $GITHUB_ENV

      - name: Send deployment report email
        if: always()
        run: |
          DEPLOY_STATUS="success"
          [ "${{ job.status }}" != "success" ] && DEPLOY_STATUS="failure"

          # Construire la liste des commits en JSON
          COMMITS_JSON=$(echo "$RECENT_COMMITS" | jq -R -s 'split("\n") | map(select(. != ""))')

          # Construire la liste des services impactes en JSON
          SERVICES_JSON=$(echo "$IMPACTED_SERVICES" | tr ',' '\n' | jq -R -s 'split("\n") | map(select(. != ""))')

          # Construire la liste des erreurs en JSON
          if [ -n "${DEPLOY_ERRORS:-}" ]; then
            ERRORS_JSON=$(echo "$DEPLOY_ERRORS" | tr ';' '\n' | jq -R -s 'split("\n") | map(select(. != ""))')
          else
            ERRORS_JSON="[]"
          fi

          # Payload JSON
          PAYLOAD=$(jq -n \
            --arg env "test" \
            --arg branch "develop" \
            --arg sha "${COMMIT_SHA}" \
            --arg msg "${COMMIT_MSG}" \
            --arg author "${COMMIT_AUTHOR}" \
            --arg version "${APP_VERSION}" \
            --arg status "$DEPLOY_STATUS" \
            --argjson duration "${DEPLOY_DURATION:-0}" \
            --arg startedAt "${DEPLOY_START}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson commits "$COMMITS_JSON" \
            --argjson services "$SERVICES_JSON" \
            --argjson errors "$ERRORS_JSON" \
            --argjson healthChecks "${HEALTH_CHECKS:-{}}" \
            --argjson coverage "${COVERAGE_DATA:-{}}" \
            '{
              environment: $env,
              branch: $branch,
              commitSha: $sha,
              commitMessage: $msg,
              commitAuthor: $author,
              appVersion: $version,
              status: $status,
              deploymentDurationSeconds: $duration,
              deploymentStartedAt: $startedAt,
              workflowRunUrl: $runUrl,
              commits: $commits,
              impactedServices: $services,
              errors: $errors,
              healthChecks: $healthChecks,
              codeCoverage: $coverage
            }')

          echo "Sending deployment report..."
          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Key: ${{ secrets.DEPLOYMENT_API_KEY }}" \
            -o /dev/null -w '%{http_code}' \
            -d "$PAYLOAD" \
            "https://api.kouroukan.dianora.org/api/deployment/report" || echo "000")

          echo "Report API response: HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "000" ] && echo "::warning::Could not send deployment report email (API unreachable)"

      - name: Notify Telegram (success)
        if: success()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Kouroukan deploye en test (Coolify)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Branche: develop

      - name: Notify Telegram (failure)
        if: failure()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Echec deploiement Kouroukan (test)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Verifier les logs GitHub Actions.

  # ===========================================================================
  # Deploy Production (main → Coolify env production)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production (Coolify)
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 50

      - name: Collect deployment context
        id: context
        run: |
          echo "DEPLOY_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "DEPLOY_START_EPOCH=$(date +%s)" >> $GITHUB_ENV

          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          COMMIT_AUTHOR=$(git log -1 --format='%an' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV

          APP_VERSION=$(cat VERSION 2>/dev/null || echo "v1.0")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          COMMITS=$(git log --oneline -10 "$COMMIT_SHA" 2>/dev/null | head -10 || echo "Aucun commit")
          echo "RECENT_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          SERVICES=""
          echo "$CHANGED" | grep -q "kouroukan.front/" && SERVICES="$SERVICES,Frontend"
          echo "$CHANGED" | grep -q "kouroukan.portal/" && SERVICES="$SERVICES,Portal"
          echo "$CHANGED" | grep -q "kouroukan.api/" && SERVICES="$SERVICES,Gateway"
          echo "$CHANGED" | grep -q "gn-core-libraries/" && SERVICES="$SERVICES,Core Libraries"
          echo "$CHANGED" | grep -q "inscriptions.service/" && SERVICES="$SERVICES,Inscriptions"
          echo "$CHANGED" | grep -q "pedagogie.service/" && SERVICES="$SERVICES,Pedagogie"
          echo "$CHANGED" | grep -q "evaluations.service/" && SERVICES="$SERVICES,Evaluations"
          echo "$CHANGED" | grep -q "presences.service/" && SERVICES="$SERVICES,Presences"
          echo "$CHANGED" | grep -q "finances.service/" && SERVICES="$SERVICES,Finances"
          echo "$CHANGED" | grep -q "personnel.service/" && SERVICES="$SERVICES,Personnel"
          echo "$CHANGED" | grep -q "communication.service/" && SERVICES="$SERVICES,Communication"
          echo "$CHANGED" | grep -q "support.service/" && SERVICES="$SERVICES,Support"
          echo "$CHANGED" | grep -q "docker" && SERVICES="$SERVICES,Docker/Infra"
          echo "$CHANGED" | grep -q "sql/" && SERVICES="$SERVICES,SQL Migrations"
          SERVICES="${SERVICES#,}"
          [ -z "$SERVICES" ] && SERVICES="Non determine"
          echo "IMPACTED_SERVICES=$SERVICES" >> $GITHUB_ENV

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts

      - name: Parse coverage data
        id: coverage
        run: |
          COVERAGE_JSON="{"
          FIRST=true

          if [ -f ci-artifacts/frontend-coverage/coverage-summary.json ]; then
            PCT=$(jq -r '.total.lines.pct // "N/A"' ci-artifacts/frontend-coverage/coverage-summary.json 2>/dev/null || echo "N/A")
            COVERAGE_JSON="${COVERAGE_JSON}\"Frontend\":\"${PCT}%\""
            FIRST=false
          fi

          for xml in $(find ci-artifacts -name "coverage.cobertura.xml" 2>/dev/null); do
            COMPONENT=$(echo "$xml" | sed 's|ci-artifacts/coverage-||;s|/.*||')
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$xml" 2>/dev/null | head -1 || echo "")
            if [ -n "$LINE_RATE" ]; then
              PCT=$(echo "$LINE_RATE * 100" | bc 2>/dev/null | cut -d. -f1-2 || echo "N/A")
              [ "$FIRST" = "false" ] && COVERAGE_JSON="${COVERAGE_JSON},"
              COVERAGE_JSON="${COVERAGE_JSON}\"${COMPONENT}\":\"${PCT}%\""
              FIRST=false
            fi
          done

          COVERAGE_JSON="${COVERAGE_JSON}}"
          echo "COVERAGE_DATA=$COVERAGE_JSON" >> $GITHUB_ENV

      - name: Trigger Coolify deployment
        run: |
          echo "Triggering Coolify PRODUCTION deployment for main branch..."
          RESPONSE=$(curl -sf --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false")

          echo "Response: $RESPONSE"
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid // empty')

          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Failed to trigger production deployment"
            echo "DEPLOY_ERRORS=Impossible de declencher le deploiement Coolify Production" >> $GITHUB_ENV
            exit 1
          fi

          echo "Production deployment queued: $DEPLOYMENT_UUID"
          echo "DEPLOYMENT_UUID=$DEPLOYMENT_UUID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        id: wait
        run: |
          echo "Waiting for production deployment $DEPLOYMENT_UUID to complete..."
          for i in $(seq 1 80); do
            STATUS=$(curl -sf --max-time 10 \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              -H "Accept: application/json" \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              | jq -r '.status // "unknown"')

            echo "  Attempt $i: status=$STATUS"

            case "$STATUS" in
              finished)
                echo "Production deployment succeeded!"
                exit 0
                ;;
              failed|cancelled)
                echo "::error::Production deployment $STATUS"
                echo "DEPLOY_ERRORS=Deploiement Production echoue (status: $STATUS)" >> $GITHUB_ENV
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Production deployment timed out after 20 minutes"
          echo "DEPLOY_ERRORS=Deploiement Production expire apres 20 minutes" >> $GITHUB_ENV
          exit 1

      - name: Health check
        id: healthcheck
        if: success()
        run: |
          echo "Running production health checks..."
          sleep 15

          HC_JSON="{"
          HC_FIRST=true
          HC_ERRORS=""

          for domain in kouroukan.gn app.kouroukan.gn api.kouroukan.gn; do
            HTTP_CODE=$(curl -sk --max-time 15 -o /dev/null -w '%{http_code}' "https://$domain" || echo "000")
            echo "  $domain -> HTTP $HTTP_CODE"

            [ "$HC_FIRST" = "false" ] && HC_JSON="${HC_JSON},"
            HC_JSON="${HC_JSON}\"${domain}\":\"${HTTP_CODE}\""
            HC_FIRST=false

            if [ "$HTTP_CODE" = "000" ]; then
              HC_ERRORS="${HC_ERRORS}$domain timeout (unreachable);"
            elif [ "$HTTP_CODE" -ge 500 ] && [ "$domain" != "api.kouroukan.gn" ]; then
              HC_ERRORS="${HC_ERRORS}$domain HTTP $HTTP_CODE;"
            fi
          done

          HC_JSON="${HC_JSON}}"
          echo "HEALTH_CHECKS=$HC_JSON" >> $GITHUB_ENV

          if [ -n "$HC_ERRORS" ]; then
            echo "DEPLOY_ERRORS=${DEPLOY_ERRORS:-}Health checks echoues: $HC_ERRORS" >> $GITHUB_ENV
            echo "::error::Health check failures: $HC_ERRORS"
            exit 1
          fi

          echo "All production health checks passed"

      - name: Calculate deployment duration
        if: always()
        run: |
          DEPLOY_END_EPOCH=$(date +%s)
          DURATION=$((DEPLOY_END_EPOCH - DEPLOY_START_EPOCH))
          echo "DEPLOY_DURATION=$DURATION" >> $GITHUB_ENV

      - name: Send deployment report email
        if: always()
        run: |
          DEPLOY_STATUS="success"
          [ "${{ job.status }}" != "success" ] && DEPLOY_STATUS="failure"

          COMMITS_JSON=$(echo "$RECENT_COMMITS" | jq -R -s 'split("\n") | map(select(. != ""))')
          SERVICES_JSON=$(echo "$IMPACTED_SERVICES" | tr ',' '\n' | jq -R -s 'split("\n") | map(select(. != ""))')

          if [ -n "${DEPLOY_ERRORS:-}" ]; then
            ERRORS_JSON=$(echo "$DEPLOY_ERRORS" | tr ';' '\n' | jq -R -s 'split("\n") | map(select(. != ""))')
          else
            ERRORS_JSON="[]"
          fi

          PAYLOAD=$(jq -n \
            --arg env "production" \
            --arg branch "main" \
            --arg sha "${COMMIT_SHA}" \
            --arg msg "${COMMIT_MSG}" \
            --arg author "${COMMIT_AUTHOR}" \
            --arg version "${APP_VERSION}" \
            --arg status "$DEPLOY_STATUS" \
            --argjson duration "${DEPLOY_DURATION:-0}" \
            --arg startedAt "${DEPLOY_START}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson commits "$COMMITS_JSON" \
            --argjson services "$SERVICES_JSON" \
            --argjson errors "$ERRORS_JSON" \
            --argjson healthChecks "${HEALTH_CHECKS:-{}}" \
            --argjson coverage "${COVERAGE_DATA:-{}}" \
            '{
              environment: $env,
              branch: $branch,
              commitSha: $sha,
              commitMessage: $msg,
              commitAuthor: $author,
              appVersion: $version,
              status: $status,
              deploymentDurationSeconds: $duration,
              deploymentStartedAt: $startedAt,
              workflowRunUrl: $runUrl,
              commits: $commits,
              impactedServices: $services,
              errors: $errors,
              healthChecks: $healthChecks,
              codeCoverage: $coverage
            }')

          echo "Sending deployment report..."
          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Key: ${{ secrets.DEPLOYMENT_API_KEY }}" \
            -o /dev/null -w '%{http_code}' \
            -d "$PAYLOAD" \
            "https://api.kouroukan.gn/api/deployment/report" || echo "000")

          echo "Report API response: HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "000" ] && echo "::warning::Could not send deployment report email (API unreachable)"

      - name: Notify Telegram (success)
        if: success()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Kouroukan deploye en PRODUCTION (Coolify)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Branche: main
            Domaine: https://kouroukan.gn

      - name: Notify Telegram (failure)
        if: failure()
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Echec deploiement Kouroukan (PRODUCTION)
            Commit: ${{ github.event.workflow_run.head_sha }}
            Verifier les logs GitHub Actions immediatement.
