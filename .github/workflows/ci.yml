# =============================================================================
# Kouroukan - CI Pipeline
# =============================================================================
# Declenchement : push et pull requests sur toutes les branches
# Jobs intelligents : chaque job ne se lance que si ses fichiers sont modifies
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Detect changes — Determine which projects were modified
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      portal: ${{ steps.filter.outputs.portal }}
      docker: ${{ steps.filter.outputs.docker }}
      sql: ${{ steps.filter.outputs.sql }}
      gateway: ${{ steps.filter.outputs.gateway }}
      shared-libs: ${{ steps.filter.outputs.shared-libs }}
      inscriptions: ${{ steps.filter.outputs.inscriptions }}
      pedagogie: ${{ steps.filter.outputs.pedagogie }}
      evaluations: ${{ steps.filter.outputs.evaluations }}
      presences: ${{ steps.filter.outputs.presences }}
      finances: ${{ steps.filter.outputs.finances }}
      personnel: ${{ steps.filter.outputs.personnel }}
      communication: ${{ steps.filter.outputs.communication }}
      bde: ${{ steps.filter.outputs.bde }}
      documents: ${{ steps.filter.outputs.documents }}
      services-premium: ${{ steps.filter.outputs.services-premium }}
      support: ${{ steps.filter.outputs.support }}
      services-matrix: ${{ steps.matrix.outputs.matrix }}
      any-service: ${{ steps.matrix.outputs.any-service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'kouroukan.front/**'
            portal:
              - 'kouroukan.portal/**'
            gateway:
              - 'vs2022/kouroukan.api/**'
              - 'vs2022/gn-core-libraries/**'
            shared-libs:
              - 'vs2022/gn-core-libraries/**'
              - 'vs2022/gn-cache/**'
            inscriptions:
              - 'vs2022/inscriptions.service/**'
            pedagogie:
              - 'vs2022/pedagogie.service/**'
            evaluations:
              - 'vs2022/evaluations.service/**'
            presences:
              - 'vs2022/presences.service/**'
            finances:
              - 'vs2022/finances.service/**'
            personnel:
              - 'vs2022/personnel.service/**'
            communication:
              - 'vs2022/communication.service/**'
            bde:
              - 'vs2022/bde.service/**'
            documents:
              - 'vs2022/documents.service/**'
            services-premium:
              - 'vs2022/services-premium.service/**'
            support:
              - 'vs2022/support.service/**'
            docker:
              - 'docker/**'
              - 'docker-compose.coolify.yml'
              - 'docker-compose.production.yml'
            sql:
              - 'sql/**'

      - name: Build dynamic services matrix
        id: matrix
        run: |
          SHARED="${{ steps.filter.outputs.shared-libs }}"
          MATRIX="["
          FIRST=true

          add_service() {
            local name="$1" solution="$2" docker_name="$3" changed="$4"
            if [ "$changed" = "true" ] || [ "$SHARED" = "true" ]; then
              if [ "$FIRST" = "false" ]; then MATRIX="$MATRIX,"; fi
              MATRIX="$MATRIX{\"name\":\"$name\",\"solution\":\"$solution\",\"docker\":\"$docker_name\"}"
              FIRST=false
            fi
          }

          add_service "inscriptions" "vs2022/inscriptions.service/Inscriptions.Service.sln" "inscriptions-service" "${{ steps.filter.outputs.inscriptions }}"
          add_service "pedagogie" "vs2022/pedagogie.service/Pedagogie.Service.sln" "pedagogie-service" "${{ steps.filter.outputs.pedagogie }}"
          add_service "evaluations" "vs2022/evaluations.service/Evaluations.Service.sln" "evaluations-service" "${{ steps.filter.outputs.evaluations }}"
          add_service "presences" "vs2022/presences.service/Presences.Service.sln" "presences-service" "${{ steps.filter.outputs.presences }}"
          add_service "finances" "vs2022/finances.service/Finances.Service.sln" "finances-service" "${{ steps.filter.outputs.finances }}"
          add_service "personnel" "vs2022/personnel.service/Personnel.Service.sln" "personnel-service" "${{ steps.filter.outputs.personnel }}"
          add_service "communication" "vs2022/communication.service/Communication.Service.sln" "communication-service" "${{ steps.filter.outputs.communication }}"
          add_service "bde" "vs2022/bde.service/Bde.Service.sln" "bde-service" "${{ steps.filter.outputs.bde }}"
          add_service "documents" "vs2022/documents.service/Documents.Service.sln" "documents-service" "${{ steps.filter.outputs.documents }}"
          add_service "services-premium" "vs2022/services-premium.service/ServicesPremium.Service.sln" "services-premium-service" "${{ steps.filter.outputs.services-premium }}"
          add_service "support" "vs2022/support.service/Support.Service.sln" "support-service" "${{ steps.filter.outputs.support }}"

          MATRIX="$MATRIX]"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [ "$MATRIX" = "[]" ]; then
            echo "any-service=false" >> $GITHUB_OUTPUT
          else
            echo "any-service=true" >> $GITHUB_OUTPUT
          fi

          echo "Services matrix: $MATRIX"

  # ===========================================================================
  # Frontend — Lint + Tests
  # ===========================================================================
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: kouroukan.front/package-lock.json

      - name: Install dependencies
        working-directory: kouroukan.front
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: kouroukan.front
        run: npm run lint

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: kouroukan.front/package-lock.json

      - name: Install dependencies
        working-directory: kouroukan.front
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        working-directory: kouroukan.front
        run: npx vitest run --coverage.enabled --coverage.thresholds.100=false --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: kouroukan.front/coverage/coverage-summary.json
          retention-days: 7

  # ===========================================================================
  # Portal — Lint
  # ===========================================================================
  lint-portal:
    name: Lint Portal
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: kouroukan.portal/package-lock.json

      - name: Install dependencies
        working-directory: kouroukan.portal
        run: npm ci

      - name: Lint
        working-directory: kouroukan.portal
        run: npm run lint

  # ===========================================================================
  # Backend — Gateway + Shared Libraries (always tested if any backend changes)
  # ===========================================================================
  test-gateway:
    name: Test Gateway & Core Libraries
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || needs.changes.outputs.shared-libs == 'true'
    strategy:
      matrix:
        solution:
          - vs2022/kouroukan.api/kouroukan.api.sln
          - vs2022/gn-cache/gn-cache.sln
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ matrix.solution }}

      - name: Build
        run: dotnet build ${{ matrix.solution }} --no-restore -c Release

      - name: Test with coverage
        run: >
          dotnet test ${{ matrix.solution }} --no-build -c Release --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Extract solution name
        id: sln-name
        run: echo "name=$(basename '${{ matrix.solution }}' .sln)" >> $GITHUB_OUTPUT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ steps.sln-name.outputs.name }}
          path: "**/test-results.trx"
          retention-days: 7

      - name: Upload gateway coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ steps.sln-name.outputs.name }}
          path: coverage/**/coverage.cobertura.xml
          retention-days: 7

  # ===========================================================================
  # Backend — Microservices (only tested if their files or shared libs change)
  # ===========================================================================
  test-services:
    name: "Test ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any-service == 'true'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ matrix.service.solution }}

      - name: Build
        run: dotnet build ${{ matrix.service.solution }} --no-restore -c Release

      - name: Test with coverage
        run: >
          dotnet test ${{ matrix.service.solution }} --no-build -c Release --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service.name }}
          path: "**/test-results.trx"
          retention-days: 7

      - name: Upload service coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service.name }}
          path: coverage/**/coverage.cobertura.xml
          retention-days: 7

  # ===========================================================================
  # SQL — Validate migrations
  # ===========================================================================
  validate-sql:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sql == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kouroukan
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: kouroukan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kouroukan -d kouroukan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        env:
          PGPASSWORD: testpassword
        run: |
          for file in $(ls sql/V*.sql | sort); do
            echo "Executing $file..."
            psql -h localhost -U kouroukan -d kouroukan -f "$file"
          done
          echo "All migrations executed successfully"

  # ===========================================================================
  # Docker — Build images
  # develop : selective (only changed services) pour des builds rapides
  # main    : full rebuild (toutes les images) pour la production
  # ===========================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [changes, lint-frontend, test-frontend, lint-portal, test-gateway, test-services]
    if: |
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure') &&
      (github.ref == 'refs/heads/main' ||
       needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.portal == 'true' ||
       needs.changes.outputs.gateway == 'true' ||
       needs.changes.outputs.shared-libs == 'true' ||
       needs.changes.outputs.any-service == 'true' ||
       needs.changes.outputs.docker == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Generate app version
        id: version
        run: |
          BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          BRANCH="${GITHUB_REF_NAME}"
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)

          if [ "$BRANCH" = "main" ]; then
            APP_VERSION="v${BASE_VERSION}"
          elif [ "$BRANCH" = "develop" ]; then
            APP_VERSION="v${BASE_VERSION}-dev.${TIMESTAMP}"
          else
            # Nettoyer le nom de branche (feat/xxx → feat-xxx)
            CLEAN_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 30)
            APP_VERSION="v${BASE_VERSION}-${CLEAN_BRANCH}.${TIMESTAMP}"
          fi

          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $APP_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Production (main) : rebuild complet ---
      - name: Build ALL images (production)
        if: github.ref == 'refs/heads/main'
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker compose -f docker-compose.production.yml build --parallel \
            --build-arg APP_VERSION=$APP_VERSION

      # --- Autres branches : rebuild selectif par service ---
      - name: Build changed images only
        if: github.ref != 'refs/heads/main'
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          SERVICES_MATRIX: ${{ needs.changes.outputs.services-matrix }}
        run: |
          SERVICES=""

          # Frontend
          if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            SERVICES="$SERVICES frontend"
          fi

          # Portal
          if [ "${{ needs.changes.outputs.portal }}" = "true" ]; then
            SERVICES="$SERVICES portal"
          fi

          # Gateway
          if [ "${{ needs.changes.outputs.gateway }}" = "true" ] || [ "${{ needs.changes.outputs.shared-libs }}" = "true" ]; then
            SERVICES="$SERVICES gateway cache"
          fi

          # Microservices — uniquement ceux qui ont change
          DOCKER_SERVICES=$(echo "$SERVICES_MATRIX" | jq -r '.[].docker' 2>/dev/null || true)
          for svc in $DOCKER_SERVICES; do
            SERVICES="$SERVICES $svc"
          done

          # Docker/infra changes
          if [ "${{ needs.changes.outputs.docker }}" = "true" ]; then
            SERVICES="$SERVICES kouroukan-db kouroukan-redis rabbitmq minio"
          fi

          if [ -z "$SERVICES" ]; then
            echo "No services to build"
            exit 0
          fi

          echo "Building services: $SERVICES"
          docker compose -f docker-compose.coolify.yml build --parallel $SERVICES \
            --build-arg APP_VERSION=$APP_VERSION

  # ===========================================================================
  # Security — Scan avec Trivy
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

  # ===========================================================================
  # Notification CI — Rapport par email apres chaque execution CI
  # ===========================================================================
  notify-ci:
    name: CI Report Email
    runs-on: ubuntu-latest
    needs: [changes, lint-frontend, test-frontend, lint-portal, test-gateway, test-services, validate-sql, build-docker, security-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Collect CI results
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --format='%s' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          COMMIT_AUTHOR=$(git log -1 --format='%an' "$COMMIT_SHA" 2>/dev/null || echo "N/A")
          BRANCH="${{ github.ref_name }}"

          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          # Determine global status
          RESULTS="${{ needs.lint-frontend.result }},${{ needs.test-frontend.result }},${{ needs.lint-portal.result }},${{ needs.test-gateway.result }},${{ needs.test-services.result }},${{ needs.validate-sql.result }},${{ needs.build-docker.result }},${{ needs.security-scan.result }}"

          if echo "$RESULTS" | grep -q "failure"; then
            echo "CI_STATUS=failure" >> $GITHUB_ENV
          else
            echo "CI_STATUS=success" >> $GITHUB_ENV
          fi

          # Build job results JSON
          cat > /tmp/ci-jobs.json <<'ENDJSON'
          {
            "Lint Frontend": "${{ needs.lint-frontend.result }}",
            "Test Frontend": "${{ needs.test-frontend.result }}",
            "Lint Portal": "${{ needs.lint-portal.result }}",
            "Test Gateway": "${{ needs.test-gateway.result }}",
            "Test Services": "${{ needs.test-services.result }}",
            "Validate SQL": "${{ needs.validate-sql.result }}",
            "Build Docker": "${{ needs.build-docker.result }}",
            "Security Scan": "${{ needs.security-scan.result }}"
          }
          ENDJSON

          # Changed services
          SERVICES=""
          [ "${{ needs.changes.outputs.frontend }}" = "true" ] && SERVICES="$SERVICES,Frontend"
          [ "${{ needs.changes.outputs.portal }}" = "true" ] && SERVICES="$SERVICES,Portal"
          [ "${{ needs.changes.outputs.gateway }}" = "true" ] && SERVICES="$SERVICES,Gateway"
          [ "${{ needs.changes.outputs.sql }}" = "true" ] && SERVICES="$SERVICES,SQL"
          [ "${{ needs.changes.outputs.docker }}" = "true" ] && SERVICES="$SERVICES,Docker"
          SERVICES="${SERVICES#,}"
          [ -z "$SERVICES" ] && SERVICES="Aucun changement detecte"
          echo "CHANGED_SERVICES=$SERVICES" >> $GITHUB_ENV

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: ci-artifacts

      - name: Parse coverage data
        run: |
          COVERAGE_JSON="{"
          FIRST=true

          # Frontend coverage from vitest json-summary
          if [ -f ci-artifacts/frontend-coverage/coverage-summary.json ]; then
            PCT=$(jq -r '.total.lines.pct // "N/A"' ci-artifacts/frontend-coverage/coverage-summary.json 2>/dev/null || echo "N/A")
            COVERAGE_JSON="${COVERAGE_JSON}\"Frontend\":\"${PCT}%\""
            FIRST=false
          fi

          # .NET coverage from Cobertura XML — one entry per artifact folder
          for dir in $(find ci-artifacts -type d -name "coverage-*" 2>/dev/null | sort -u); do
            COMPONENT=$(basename "$dir" | sed 's/^coverage-//')
            # Find the first cobertura XML in this artifact folder (root-level has overall rate)
            xml=$(find "$dir" -name "coverage.cobertura.xml" 2>/dev/null | head -1)
            [ -z "$xml" ] && continue
            # Extract line-rate from the root <coverage> element (first occurrence)
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$xml" 2>/dev/null | head -1 || echo "")
            [ -z "$LINE_RATE" ] && continue
            # Calculate percentage with 2 decimal precision using awk
            PCT=$(awk "BEGIN { printf \"%.2f\", $LINE_RATE * 100 }" 2>/dev/null || echo "N/A")
            [ "$FIRST" = "false" ] && COVERAGE_JSON="${COVERAGE_JSON},"
            COVERAGE_JSON="${COVERAGE_JSON}\"${COMPONENT}\":\"${PCT}%\""
            FIRST=false
          done

          COVERAGE_JSON="${COVERAGE_JSON}}"
          echo "COVERAGE_DATA=$COVERAGE_JSON" >> $GITHUB_ENV

      - name: Send CI report email
        run: |
          JOB_RESULTS=$(cat /tmp/ci-jobs.json)

          # Build errors array using jq (only failed jobs)
          echo '[]' > /tmp/errors.json
          for job in "Lint Frontend" "Test Frontend" "Lint Portal" "Test Gateway" "Test Services" "Validate SQL" "Build Docker" "Security Scan"; do
            RESULT=$(echo "$JOB_RESULTS" | jq -r --arg j "$job" '.[$j] // "skipped"' 2>/dev/null || echo "skipped")
            if [ "$RESULT" = "failure" ]; then
              jq --arg e "Job echoue: $job" '. + [$e]' /tmp/errors.json > /tmp/errors2.json && mv /tmp/errors2.json /tmp/errors.json
            fi
          done

          # Build health checks object using jq
          echo '{}' > /tmp/hc.json
          for job in "Lint Frontend" "Test Frontend" "Lint Portal" "Test Gateway" "Test Services" "Validate SQL" "Build Docker" "Security Scan"; do
            RESULT=$(echo "$JOB_RESULTS" | jq -r --arg j "$job" '.[$j] // "skipped"' 2>/dev/null || echo "skipped")
            case "$RESULT" in
              success) CODE="200" ;;
              failure) CODE="500" ;;
              skipped) CODE="304" ;;
              *) CODE="000" ;;
            esac
            jq --arg k "$job" --arg v "$CODE" '. + {($k): $v}' /tmp/hc.json > /tmp/hc2.json && mv /tmp/hc2.json /tmp/hc.json
          done

          # Build commits and services arrays
          git log --oneline -5 "$COMMIT_SHA" 2>/dev/null | jq -R -s 'split("\n") | map(select(. != ""))' > /tmp/commits.json || echo '[]' > /tmp/commits.json
          echo "$CHANGED_SERVICES" | tr ',' '\n' | jq -R -s 'split("\n") | map(select(. != ""))' > /tmp/services.json || echo '[]' > /tmp/services.json

          # Write coverage to file (avoid ${VAR:-{}} as bash misparses the braces)
          if [ -n "${COVERAGE_DATA:-}" ]; then
            echo "$COVERAGE_DATA" > /tmp/coverage.json
          else
            echo '{}' > /tmp/coverage.json
          fi

          # Build payload safely using --slurpfile to avoid shell quoting issues
          PAYLOAD=$(jq -n \
            --arg env "ci-$BRANCH" \
            --arg branch "$BRANCH" \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg author "$COMMIT_AUTHOR" \
            --arg version "CI Run #${{ github.run_number }}" \
            --arg status "$CI_STATUS" \
            --argjson duration 0 \
            --arg startedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --slurpfile commits /tmp/commits.json \
            --slurpfile services /tmp/services.json \
            --slurpfile errors /tmp/errors.json \
            --slurpfile healthChecks /tmp/hc.json \
            --slurpfile coverage /tmp/coverage.json \
            '{
              environment: $env,
              branch: $branch,
              commitSha: $sha,
              commitMessage: $msg,
              commitAuthor: $author,
              appVersion: $version,
              status: $status,
              deploymentDurationSeconds: $duration,
              deploymentStartedAt: $startedAt,
              workflowRunUrl: $runUrl,
              commits: $commits[0],
              impactedServices: $services[0],
              errors: $errors[0],
              healthChecks: $healthChecks[0],
              codeCoverage: $coverage[0]
            }')

          # Try test environment API first, fall back silently
          echo "Sending CI report..."
          HTTP_CODE=$(curl -sf --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Key: ${{ secrets.DEPLOYMENT_API_KEY }}" \
            -o /dev/null -w '%{http_code}' \
            -d "$PAYLOAD" \
            "https://api.kouroukan.dianora.org/api/deployment/report" 2>/dev/null || echo "000")

          echo "CI Report API response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::notice::CI report email could not be sent (API response: $HTTP_CODE). This is non-blocking."
          fi
        continue-on-error: true
