# =============================================================================
# Kouroukan - Release Pipeline
# =============================================================================
# Declenchement : a chaque push sur main (merge de develop)
# Action : incremente la version mineure, commit, tag git
# =============================================================================

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    # Ne pas boucler sur nos propres commits de version
    if: "!contains(github.event.head_commit.message, 'chore(release):')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Read current version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumping version: $CURRENT -> $NEW_VERSION"

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.new }}" > VERSION

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): bump version to v${{ steps.version.outputs.new }}"
          git push

      - name: Create git tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Kouroukan ${{ steps.version.outputs.tag }}

            Merge de develop vers main.

            **Version precedente:** v${{ steps.version.outputs.current }}
          generate_release_notes: true
